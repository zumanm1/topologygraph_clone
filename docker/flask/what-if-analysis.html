{% extends "base.html" %}

{% block metadata %}
<meta name="description" content="What-If Analysis — Node and Link failure simulation workspace">
{% endblock %}

{% block content %}
<style>
    .wi-container {
        display: flex;
        height: calc(100vh - 120px);
        overflow: hidden;
        gap: 10px;
    }

    .wi-sidebar {
        width: 320px;
        background: #1e293b;
        color: white;
        padding: 15px;
        overflow-y: auto;
        border-right: 1px solid #334155;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
    }

    .wi-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #0f172a;
        position: relative;
        border-radius: 8px;
        overflow: hidden;
    }

    .wi-toolbar {
        height: 50px;
        background: #1e293b;
        display: flex;
        align-items: center;
        padding: 0 15px;
        border-bottom: 1px solid #334155;
        gap: 15px;
    }

    .wi-viewport {
        flex: 1;
        position: relative;
        display: flex;
        flex-direction: column;
    }

    #wiFilterBar {
        padding: 5px 10px;
        background: #1e2a38;
        border-bottom: 1px solid #2d3f54;
    }

    /* ── Topology ────────────────────────────────────────────────────── */
    #wiTopoContainer {
        flex: 1;
        background: #020617;
        border-radius: 8px;
        border: 1px solid #2d3f54;
    }

    .il-spinner {
        display: inline-block;
        width: 10px;
        height: 10px;
        border: 2px solid #3d5066;
        border-top-color: #4a9eff;
        border-radius: 50%;
        animation: il-spin 0.6s linear infinite;
        margin-right: 4px;
    }

    @keyframes il-spin {
        to {
            transform: rotate(360deg);
        }
    }

    .stat-box {
        background: #334155;
        border-radius: 6px;
        padding: 10px;
        margin-bottom: 10px;
        border-left: 4px solid #3b82f6;
    }

    .impact-summary {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        margin-top: 15px;
    }

    .stat-box {
        background: #0f172a;
        padding: 8px;
        border-radius: 4px;
        text-align: center;
        border: 1px solid #334155;
    }

    .stat-val {
        font-size: 16px;
        font-weight: bold;
        display: block;
    }

    .stat-label {
        font-size: 9px;
        color: #94a3b8;
        text-transform: uppercase;
    }
</style>

<div class="wi-container">
    <div class="wi-sidebar" id="wiLeft">
        <h5 class="mb-3">⚡ What-If Analysis</h5>

        <div class="mb-3 p-3 bg-dark rounded border border-secondary">
            <h6 class="small font-weight-bold mb-2">📅 Graph Snapshot</h6>
            <select id="wiGraphTime" class="form-control form-control-sm bg-dark text-white border-secondary mb-2"
                onchange="wiOnGraphTimeChange(this.value)"></select>
            <div id="wiStatus" class="small text-muted">Loading…</div>
        </div>

        <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="small font-weight-bold mb-0">🛠 Active Scenarios</h6>
                <button class="btn btn-xs btn-primary" onclick="wiAddScenario()">+</button>
            </div>
            <div id="scenario-list">
                <div class="text-muted small">No modifications applied.</div>
            </div>
        </div>

        <div class="mb-3">
            <h6 class="small font-weight-bold mb-2">📊 Impact Summary</h6>
            <div class="impact-summary">
                <div class="stat-box">
                    <span class="stat-val text-success" id="impact-unaffected">0</span>
                    <span class="stat-label">Stable</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val text-warning" id="impact-degraded">0</span>
                    <span class="stat-label">Slow</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val text-danger" id="impact-lost">0</span>
                    <span class="stat-label">Lost</span>
                </div>
            </div>
        </div>

        <div class="mt-auto pt-3">
            <button class="btn btn-sm btn-success btn-block" onclick="wiPushToPlanner()">📋 Push to Planner</button>
            <button class="btn btn-sm btn-outline-info btn-block mt-1" onclick="wiRunKPath()">🛤 Run K-Path</button>
        </div>
    </div>

    <div class="wi-main">
        <div class="wi-toolbar">
            <div class="btn-group btn-group-sm">
                <button class="btn btn-dark border-secondary active">Topology View</button>
                <button class="btn btn-dark border-secondary">Impact Matrix</button>
            </div>
            <div class="ml-auto text-muted small" id="wiStatusDetail">Current State: Baseline</div>
        </div>
        <div class="wi-viewport">
            <div id="wiFilterBar"></div>
            <div id="wiTopoContainer"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/vis-network@9.1.2/standalone/umd/vis-network.min.js"></script>
<script src="{{ url_for('static', filename='js/topolograph.js') }}"></script>
<script src="{{ url_for('static', filename='js/ospf-ksp.js') }}"></script>
<script src="{{ url_for('static', filename='js/topo-filter-bar.js') }}"></script>
<script src="{{ url_for('static', filename='js/what-if-analysis.js') }}"></script>
<script>
    $(document).ready(function () {
        wiInit();
    });
</script>
{% endblock %}
