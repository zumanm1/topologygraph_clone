{% extends "base.html" %}

{% block metadata %}
<meta name="description" content="OSPF Cost Matrix — Country-to-country reachability with path detail">
{% endblock %}

{% block content %}
<style>
    /* ── Layout ──────────────────────────────────────────────────── */
    .matrix-container {
        display: flex;
        height: calc(100vh - 56px);
        overflow: hidden;
    }

    .matrix-sidebar {
        width: 280px;
        flex-shrink: 0;
        background: #1e293b;
        color: white;
        padding: 16px;
        overflow-y: auto;
        border-right: 1px solid #334155;
        display: flex;
        flex-direction: column;
    }

    .matrix-main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        background: #0f172a;
        position: relative;
        overflow: hidden;
    }

    .matrix-toolbar {
        height: 50px;
        flex-shrink: 0;
        background: #1e293b;
        display: flex;
        align-items: center;
        padding: 0 16px;
        border-bottom: 1px solid #334155;
        gap: 12px;
    }

    .matrix-viewport {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 16px;
        position: relative;
    }

    /* ── Matrix Table ─────────────────────────────────────────────── */
    table.rm-table {
        border-collapse: separate;
        border-spacing: 2px;
        font-family: 'Inter', -apple-system, sans-serif;
        font-size: 12px;
    }

    th.rm-hdr-col {
        position: sticky;
        top: 0;
        background: #1e293b;
        color: #94a3b8;
        padding: 6px 8px;
        z-index: 10;
        border-bottom: 1px solid #334155;
        min-width: 52px;
        text-align: center;
        font-size: 11px;
    }

    th.rm-hdr-row {
        position: sticky;
        left: 0;
        background: #1e293b;
        color: #94a3b8;
        padding: 6px 10px;
        z-index: 9;
        border-right: 1px solid #334155;
        text-align: right;
        font-size: 11px;
        white-space: nowrap;
    }

    .rm-cell {
        width: 52px;
        height: 34px;
        text-align: center;
        vertical-align: middle;
        border-radius: 3px;
        transition: transform 0.15s, opacity 0.15s;
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
    }

    .rm-cell:hover {
        opacity: 0.85;
        transform: scale(1.08);
        z-index: 11;
        position: relative;
    }

    .rm-selected {
        outline: 2px solid #60a5fa !important;
        outline-offset: 1px;
        z-index: 12;
        position: relative;
    }

    .rm-self  { background: #374151; color: #94a3b8; }
    .rm-low   { background: #166534; color: #4ade80; }
    .rm-med   { background: #713f12; color: #fbbf24; }
    .rm-high  { background: #7c2d12; color: #fb923c; }
    .rm-crit  { background: #7f1d1d; color: #f87171; }
    .rm-none  { background: #030712; color: #6b7280; }
    .rm-asym-warn { box-shadow: inset 0 0 0 2px #ec4899 !important; }

    /* ── Sidebar helpers ──────────────────────────────────────────── */
    .threshold-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-size: 12px;
    }

    .threshold-row input {
        width: 60px;
        background: #0f172a;
        border: 1px solid #334155;
        color: white;
        padding: 2px 5px;
        border-radius: 4px;
    }

    /* ── Detail Drawer ────────────────────────────────────────────── */
    .rm-drawer {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 42vh;
        min-height: 260px;
        background: #131c2e;
        border-top: 2px solid #2d4a7a;
        z-index: 50;
        display: flex;
        flex-direction: column;
        transform: translateY(100%);
        transition: transform 0.25s ease;
        font-family: 'Inter', -apple-system, sans-serif;
        font-size: 12px;
    }

    .rm-drawer-open {
        transform: translateY(0);
    }

    .rm-drawer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 14px;
        background: #1a2845;
        border-bottom: 1px solid #2d4a7a;
        flex-shrink: 0;
        gap: 10px;
        flex-wrap: wrap;
    }

    .rm-drawer-title {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #c8d8f0;
        flex-wrap: wrap;
    }

    .rm-drawer-actions {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-shrink: 0;
    }

    .rm-dir-badge {
        font-size: 9px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 3px;
        letter-spacing: 0.5px;
    }

    .rm-fwd-badge { background: #1e3a8a; color: #93c5fd; border: 1px solid #2d5fcc; }
    .rm-rev-badge { background: #3b1f6e; color: #c084fc; border: 1px solid #6d35cc; }

    .rm-asym-badge {
        font-size: 10px;
        font-weight: 700;
        color: #f472b6;
        background: #3b0a28;
        border: 1px solid #9d174d;
        border-radius: 4px;
        padding: 2px 7px;
        margin-left: 4px;
    }

    .rm-arrow { color: #64748b; font-size: 13px; }

    .rm-btn {
        padding: 4px 10px;
        border-radius: 5px;
        border: 1px solid #2d4a7a;
        background: #1a2845;
        color: #93c5fd;
        cursor: pointer;
        font-size: 11px;
        transition: background 0.15s;
    }

    .rm-btn:hover { background: #243659; }

    .rm-btn-export {
        background: #14532d;
        border-color: #166534;
        color: #86efac;
    }

    .rm-btn-export:hover { background: #166534; }

    .rm-btn-close {
        background: none;
        border: none;
        color: #64748b;
        font-size: 16px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
    }

    .rm-btn-close:hover { color: #f87171; }

    .rm-drawer-body {
        flex: 1;
        min-height: 0;
        display: flex;
        overflow: hidden;
    }

    .rm-path-panel {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .rm-path-divider {
        width: 1px;
        background: #2d4a7a;
        flex-shrink: 0;
    }

    .rm-panel-heading {
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
        flex-wrap: wrap;
        border-bottom: 1px solid #1e3050;
    }

    .rm-fwd-heading { background: #0f1f3d; color: #93c5fd; }
    .rm-rev-heading { background: #1a1030; color: #c084fc; }

    .rm-cost-badge {
        font-size: 10px;
        font-weight: 700;
        background: #1e3a8a;
        color: #bfdbfe;
        border-radius: 4px;
        padding: 1px 7px;
    }

    .rm-hops-badge {
        font-size: 10px;
        background: #374151;
        color: #9ca3af;
        border-radius: 4px;
        padding: 1px 6px;
    }

    /* ── Hop Table ────────────────────────────────────────────────── */
    .rm-hop-table-wrap {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 0 10px 10px;
    }

    .rm-hop-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
    }

    .rm-hop-table thead th {
        position: sticky;
        top: 0;
        background: #131c2e;
        color: #64748b;
        padding: 5px 8px;
        text-align: left;
        border-bottom: 1px solid #1e3050;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }

    .rm-hop-table tbody tr {
        border-bottom: 1px solid #1a2440;
        transition: background 0.1s;
    }

    .rm-hop-table tbody tr:hover { background: #1a2845; }

    .rm-hop-src td { background: #0c1f3a; font-weight: 700; }
    .rm-hop-dst td { background: #1a0c3a; font-weight: 700; }

    .rm-hop-table td { padding: 5px 8px; color: #c8d8f0; vertical-align: middle; }

    .rm-td-center { text-align: center; }
    .rm-td-label  { font-family: 'Courier New', monospace; font-size: 11px; }

    .rm-hop-num  { color: #64748b; font-size: 10px; min-width: 24px; }
    .rm-link-cost { color: #fbbf24; font-weight: 600; }
    .rm-cum-cost  { color: #4ade80; font-weight: 600; }
    .rm-router-icon { font-size: 10px; }

    .rm-country-chip {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        background: #1e3a5f;
        color: #7dd3fc;
        border: 1px solid #1d4ed8;
        border-radius: 3px;
        padding: 1px 6px;
        letter-spacing: 0.3px;
    }

    .rm-chip-src { background: #14532d; color: #86efac; border-color: #166534; }
    .rm-chip-dst { background: #3b1f6e; color: #c084fc; border-color: #6d28d9; }

    /* ── Country View ─────────────────────────────────────────────── */
    .rm-country-chain {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 10px 14px;
        overflow-y: auto;
        flex: 1;
        min-height: 0;
    }

    .rm-segment {
        display: flex;
        align-items: flex-start;
        gap: 10px;
    }

    .rm-segment-nodes {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex: 1;
    }

    .rm-country-node {
        font-size: 10px;
        color: #94a3b8;
        font-family: 'Courier New', monospace;
        padding: 1px 4px;
    }

    .rm-seg-arrow {
        color: #475569;
        font-size: 14px;
        text-align: center;
        padding: 2px 0;
    }

    .rm-no-path {
        padding: 20px 14px;
        color: #64748b;
        font-size: 12px;
        font-style: italic;
    }
</style>

<div class="matrix-container">
    <div class="matrix-sidebar">
        <h5 class="mb-3">🗺 Cost Matrix</h5>

        <div class="form-group mb-3">
            <label class="small text-muted">Graph Snapshot</label>
            <select id="matrix-topo-select" class="form-control form-control-sm bg-dark text-white border-secondary"></select>
        </div>

        <div class="mb-3">
            <h6 class="small font-weight-bold mb-2">🎨 Cost Thresholds</h6>
            <div class="threshold-row">
                <span class="badge badge-success">Low</span>
                <span class="small text-muted">&lt;</span>
                <input type="number" id="th-low" value="500">
            </div>
            <div class="threshold-row">
                <span class="badge badge-warning">Med</span>
                <span class="small text-muted">&lt;</span>
                <input type="number" id="th-med" value="1500">
            </div>
            <div class="threshold-row">
                <span class="badge badge-danger">High</span>
                <span class="small text-muted">&lt;</span>
                <input type="number" id="th-high" value="3000">
            </div>
            <button class="btn btn-sm btn-outline-info btn-block mt-1" onclick="rmApplyThresholds()">Apply Colors</button>
        </div>

        <div class="mb-3">
            <h6 class="small font-weight-bold mb-2">🔍 Audit Tools</h6>
            <div class="custom-control custom-switch">
                <input type="checkbox" class="custom-control-input" id="sw-asymmetry" onchange="rmToggleAsymmetry()">
                <label class="custom-control-label small" for="sw-asymmetry">Path Asymmetry Audit</label>
            </div>
        </div>

        <div class="mb-3">
            <h6 class="small font-weight-bold mb-2">ℹ️ Legend</h6>
            <div class="d-flex flex-column gap-1" style="font-size:11px;">
                <span><span class="badge" style="background:#166534;color:#4ade80;">Low</span> &nbsp;Cost &lt; threshold</span>
                <span><span class="badge" style="background:#713f12;color:#fbbf24;">Med</span> &nbsp;Medium cost</span>
                <span><span class="badge" style="background:#7c2d12;color:#fb923c;">High</span> &nbsp;High cost</span>
                <span><span class="badge" style="background:#7f1d1d;color:#f87171;">Crit</span> &nbsp;Critical cost</span>
                <span><span class="badge badge-secondary">∞</span> &nbsp;No path</span>
            </div>
        </div>

        <div class="mt-auto pt-3">
            <button class="btn btn-sm btn-primary btn-block" onclick="rmExportCSV()">📄 Export Matrix CSV</button>
            <button class="btn btn-sm btn-outline-secondary btn-block mt-2" onclick="rmExportMarkdown()">📋 Copy as Markdown</button>
        </div>
    </div>

    <div class="matrix-main">
        <div class="matrix-toolbar">
            <div class="input-group input-group-sm" style="width: 220px;">
                <div class="input-group-prepend">
                    <span class="input-group-text bg-dark border-secondary text-muted">🔍</span>
                </div>
                <input type="text" id="rm-search" class="form-control bg-dark border-secondary text-white"
                    placeholder="Search countries…" onkeyup="rmFilterMatrix()">
            </div>
            <div class="ml-auto"></div>
            <div id="matrix-stats" class="text-muted small"></div>
        </div>
        <div class="matrix-viewport" id="matrix-display">
            <div class="d-flex justify-content-center align-items-center h-100">
                <div class="text-center">
                    <div class="spinner-border text-primary mb-3"></div>
                    <p class="text-muted">Computing reachability matrix…</p>
                </div>
            </div>
        </div>
        <!-- Detail drawer is injected here by cost-matrix.js -->
    </div>
</div>

<script src="/static/js/ospf-ksp.js"></script>
<script src="/static/js/cost-matrix.js"></script>
<script>
    $(document).ready(function () {
        rmInit();
    });
</script>

{% endblock %}
